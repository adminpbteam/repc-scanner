<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Pelikat Marathon</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f9; margin: 0; padding: 20px; }
        #reader { width: 100%; max-width: 400px; margin: auto; border-radius: 15px; overflow: hidden; border: 2px solid #ddd; }
        .result-card { background: white; padding: 20px; border-radius: 15px; margin-top: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: none; }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; text-align: center; }
        button { background: #27ae60; color: white; padding: 15px 30px; border: none; border-radius: 10px; font-size: 18px; cursor: pointer; width: 90%; font-weight: bold; }
        .loading { color: #666; font-style: italic; }
    </style>
</head>
<body>

    <h2 style="color: #2c3e50;">REPC SCANNER 🚀</h2>
    <div id="reader"></div>
    <p id="status-msg" class="loading">Sila benarkan akses kamera...</p>

    <div id="result" class="result-card">
        <h2 id="p-name" style="margin-top:0; color:#2c3e50;">Nama Peserta</h2>
        <p style="margin:5px 0;">BIB: <b id="p-bib" style="font-size: 32px; color: #d9534f;">-</b></p>
        <p style="margin:5px 0;">SAIZ: <b id="p-size">-</b> | KATEGORI: <b id="p-cat">-</b></p>
        <hr style="border: 0; border-top: 1px solid #eee; margin: 15px 0;">
        <p style="font-size: 12px; color: #666;">TAMBAH IC KAWAN (JIKA ADA):</p>
        <input type="text" id="extra-ic" placeholder="Masukkan No. IC Tambahan">
        <br><br>
        <button id="btn-confirm" onclick="confirmCollection()">SAHKAN PENGAMBILAN</button>
        <br><br>
        <a href="#" onclick="location.reload()" style="font-size: 14px; color: #999;">Batal / Scan Semula</a>
    </div>

    <script>
        // --- GANTIKAN DENGAN CONFIG FIREBASE ANDA ---
        const firebaseConfig = {
            apiKey: "SALIN_API_KEY_DARI_FIREBASE",
            authDomain: "repc-712cd.firebaseapp.com",
            databaseURL: "https://repc-712cd-default-rtdb.firebaseio.com",
            projectId: "repc-712cd",
            storageBucket: "repc-712cd.appspot.com",
            messagingSenderId: "SENDER_ID_ANDA",
            appId: "APP_ID_ANDA"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentIC = "";

        // SETUP SCANNER
        const html5QrCode = new Html5Qrcode("reader");
        const config = { fps: 10, qrbox: { width: 250, height: 250 } };

        html5QrCode.start({ facingMode: "environment" }, config, (decodedText) => {
            try {
                const url = new URL(decodedText);
                currentIC = url.searchParams.get("id");
                
                if (currentIC) {
                    document.getElementById("status-msg").innerText = "Mencari data: " + currentIC;
                    lookupParticipant(currentIC);
                    html5QrCode.pause(true); // Pause scanner bila dah jumpa
                }
            } catch (e) {
                console.error("QR tidak sah");
            }
        });

        function lookupParticipant(ic) {
            db.ref("participants/" + ic).once("value", (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    document.getElementById("p-name").innerText = data.name;
                    document.getElementById("p-bib").innerText = data.bib;
                    document.getElementById("p-size").innerText = data.size;
                    document.getElementById("p-cat").innerText = data.category;
                    document.getElementById("result").style.display = "block";
                    document.getElementById("status-msg").style.display = "none";
                } else {
                    alert("Peserta (IC: " + ic + ") tidak dijumpai dalam sistem!");
                    location.reload();
                }
            });
        }

        function confirmCollection() {
            const now = new Date().toLocaleString("ms-MY", {timeZone: "Asia/Kuala_Lumpur"});
            const extraIC = document.getElementById("extra-ic").value.replace(/\D/g, "");
            
            let targets = [currentIC];
            if(extraIC) targets.push(extraIC);

            const updates = {};
            targets.forEach(ic => {
                updates["participants/" + ic + "/status"] = "COLLECTED";
                updates["participants/" + ic + "/timestamp"] = now;
            });

            db.ref().update(updates)
                .then(() => {
                    alert("✅ PENGAMBILAN BERJAYA DISAHKAN!");
                    location.reload();
                })
                .catch((error) => {
                    alert("❌ GAGAL: " + error.message);
                });
        }
    </script>
</body>
</html>
