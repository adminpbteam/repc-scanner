<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REPC Scanner - Auto Proxy</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; margin: 0; padding: 15px; }
        .container { max-width: 500px; margin: auto; }
        #reader { width: 100%; border-radius: 15px; background: white; }
        .card { background: white; border-radius: 10px; padding: 15px; margin-bottom: 10px; text-align: left; border-left: 8px solid #3498db; }
        .leader-card { border-left-color: #27ae60; background: #ebf9f1; }
        .proxy-card { border-left-color: #9b59b6; background: #f5eef8; }
        .collected { border-left-color: #95a5a6; background: #eee; color: #7f8c8d; }
        .bib { font-size: 28px; color: #e74c3c; font-weight: bold; }
        input { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { padding: 15px; border: none; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; }
        .btn-confirm { background: #27ae60; color: white; font-size: 18px; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center;">REPC TRANSACTION 🚀</h2>

    <div id="scan-ui">
        <div id="reader"></div>
        <p style="text-align:center;">Scan QR Pertama (Tuan Badan/Ketua)</p>
    </div>

    <div id="result-ui" style="display:none;">
        <div id="leader-section"></div>
        <hr>
        <div id="proxy-section">
            <p style="font-weight:bold; color:#9b59b6;">TAMBAH IC WAKIL (MAX 5):</p>
            <input type="text" class="proxy-input" placeholder="IC Wakil 1">
            <input type="text" class="proxy-input" placeholder="IC Wakil 2">
            <input type="text" class="proxy-input" placeholder="IC Wakil 3">
            <input type="text" class="proxy-input" placeholder="IC Wakil 4">
            <input type="text" class="proxy-input" placeholder="IC Wakil 5">
        </div>
        <button class="btn-confirm" onclick="processTransaction()">SAHKAN TRANSAKSI</button>
        <button onclick="location.reload()" style="background:#95a5a6; color:white;">BATAL</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDSMdRl8ZOE7GnDyN-SVXSol32ec_EkaTc",
        authDomain: "repc-712cd.firebaseapp.com",
        databaseURL: "https://repc-712cd-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "repc-712cd",
        storageBucket: "repc-712cd.firebasestorage.app",
        messagingSenderId: "856650376390",
        appId: "1:856650376390:web:8c9e97d67149c80bc023c7"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let leaderName = "";
    let leaderKeys = [];
    const scanner = new Html5Qrcode("reader");

    scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
        const url = new URL(text);
        const id = url.searchParams.get("id");
        if (id) { scanner.stop(); startTransaction(id); }
    });

    function startTransaction(ic) {
        db.ref("participants").orderByChild("ic").equalTo(ic).once("value", (snap) => {
            const data = snap.val();
            if (!data) return alert("Ketua tidak dijumpai!");

            document.getElementById("scan-ui").style.display = "none";
            document.getElementById("result-ui").style.display = "block";
            
            const leaderDiv = document.getElementById("leader-section");
            leaderDiv.innerHTML = "<b>TUAN BADAN (KETUA):</b>";
            
            Object.keys(data).forEach(key => {
                const p = data[key];
                leaderName = p.name; // Simpan nama ketua untuk digunakan sebagai nama wakil nanti
                if (p.status !== "COLLECTED") leaderKeys.push(key);

                leaderDiv.innerHTML += `
                    <div class="card leader-card ${p.status === 'COLLECTED' ? 'collected' : ''}">
                        <b>${p.name}</b><br>
                        <span class="bib">${p.bib}</span><br>
                        <small>STATUS: ${p.status} ${p.collected_by ? '(Oleh: '+p.collected_by+')' : ''}</small>
                    </div>`;
            });
        });
    }

    async function processTransaction() {
        const now = new Date().toLocaleString("ms-MY", {timeZone: "Asia/Kuala_Lumpur"});
        let updates = {};
        
        // 1. Proses Ketua (Tuan Badan)
        leaderKeys.forEach(key => {
            updates["participants/" + key + "/status"] = "COLLECTED";
            updates["participants/" + key + "/timestamp"] = now;
            updates["participants/" + key + "/collected_by"] = "TUAN BADAN";
        });

        // 2. Proses IC Wakil
        const proxyInputs = document.getElementsByClassName("proxy-input");
        for (let input of proxyInputs) {
            const fIC = input.value.trim().replace(/\D/g, "");
            if (fIC) {
                const snap = await db.ref("participants").orderByChild("ic").equalTo(fIC).once("value");
                const fData = snap.val();
                if (fData) {
                    Object.keys(fData).forEach(k => {
                        if (fData[k].status !== "COLLECTED") {
                            updates["participants/" + k + "/status"] = "COLLECTED";
                            updates["participants/" + k + "/timestamp"] = now;
                            updates["participants/" + k + "/collected_by"] = "WAKIL (" + leaderName + ")";
                        }
                    });
                }
            }
        }

        if (Object.keys(updates).length === 0) return alert("Tiada data untuk dikemaskini!");

        db.ref().update(updates).then(() => {
            alert("✅ TRANSAKSI BERJAYA!\nSemua bib telah diserahkan.");
            location.reload();
        });
    }
</script>
</body>
</html>
