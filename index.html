<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REPC Multi-Scanner Pro</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; padding: 15px; text-align: center; }
        .container { max-width: 500px; margin: auto; }
        #reader-wrapper { background: white; padding: 10px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 15px; }
        #reader { width: 100%; border-radius: 10px; overflow: hidden; }
        .card { background: white; border-radius: 10px; padding: 15px; margin-bottom: 10px; text-align: left; border-left: 10px solid #27ae60; position: relative; }
        .collected-card { border-left-color: #e67e22; background: #fff5e6; }
        .bib { font-size: 32px; color: #e74c3c; font-weight: bold; }
        .label-status { font-size: 12px; font-weight: bold; color: #666; margin-bottom: 5px; display: block; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; }
        .btn-confirm { background: #27ae60; color: white; margin-top: 15px; }
        .btn-add { background: #3498db; color: white; margin-bottom: 10px; }
        .delete-btn { background: #e74c3c; color: white; padding: 5px 10px; font-size: 12px; float: right; border-radius: 5px; width: auto; margin-top: -5px;}
        hr { border: 0; border-top: 1px solid #ddd; margin: 15px 0; }
        .timestamp-info { font-size: 11px; color: #e67e22; font-weight: bold; margin-top: 3px; display: block; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color: #2c3e50;">REPC TRANSACTION 🚀</h2>

    <div id="reader-wrapper">
        <div id="reader"></div>
        <p id="scan-instruction" style="font-weight: bold; color: #3498db; margin: 10px 0;">IMBAS QR TUAN BADAN / WAKIL</p>
    </div>

    <div style="background:white; padding: 10px; border-radius: 10px; margin-bottom: 15px;">
        <input type="text" id="manual-ic" placeholder="ATAU TAIP IC DI SINI">
        <button class="btn-add" onclick="processInput(document.getElementById('manual-ic').value)">TAMBAH IC</button>
    </div>

    <div id="transaction-ui" style="display:none; text-align: left;">
        <h3 id="transaction-title">SENARAI TRANSAKSI:</h3>
        <div id="cards-container"></div>
        
        <button class="btn-confirm" id="btn-final" onclick="submitAll()">SAHKAN SEMUA PENGAMBILAN</button>
        <button onclick="location.reload()" style="background:#95a5a6; color:white; margin-top: 10px;">BATAL / SCAN BARU</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDSMdRl8ZOE7GnDyN-SVXSol32ec_EkaTc",
        authDomain: "repc-712cd.firebaseapp.com",
        databaseURL: "https://repc-712cd-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "repc-712cd",
        storageBucket: "repc-712cd.firebasestorage.app",
        messagingSenderId: "856650376390",
        appId: "1:856650376390:web:8c9e97d67149c80bc023c7"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let leaderName = "";
    let pendaftaranToUpdate = []; 
    let scannedICs = []; 

    const html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
        try {
            const url = new URL(text);
            const id = url.searchParams.get("id");
            if (id) processInput(id);
        } catch (e) { console.log("Bukan QR Google Script"); }
    });

    function processInput(ic) {
        const cleanIC = ic.replace(/\D/g, "");
        if (!cleanIC || scannedICs.includes(cleanIC)) return;
        
        scannedICs.push(cleanIC);
        document.getElementById("manual-ic").value = "";
        
        db.ref("participants").orderByChild("ic").equalTo(cleanIC).once("value", (snapshot) => {
            const results = snapshot.val();
            if (!results) {
                alert("IC " + cleanIC + " tidak dijumpai!");
                scannedICs = scannedICs.filter(i => i !== cleanIC);
                return;
            }

            document.getElementById("transaction-ui").style.display = "block";
            const container = document.getElementById("cards-container");
            
            const isLeader = (leaderName === "");

            Object.keys(results).forEach((key) => {
                const data = results[key];
                if (isLeader) leaderName = data.name;

                const isAlreadyCollected = data.status === "COLLECTED";
                if (!isAlreadyCollected) {
                    pendaftaranToUpdate.push({ key: key, role: isLeader ? "TUAN BADAN" : "WAKIL (" + leaderName + ")" });
                }

                const card = document.createElement("div");
                card.className = `card ${isAlreadyCollected ? 'collected-card' : ''}`;
                card.innerHTML = `
                    <span class="label-status">${isLeader ? "TUAN BADAN (KETUA)" : "WAKIL KE-" + (scannedICs.length - 1)}</span>
                    <b>${data.name}</b><br>
                    <span class="bib">${data.bib}</span><br>
                    <small>${data.category} | ${data.size}</small>
                    ${isAlreadyCollected ? 
                        `<span class="timestamp-info">SUDAH DIAMBIL: ${data.collected_by || '?'}</span>
                         <span class="timestamp-info">PADA: ${data.timestamp || '-'}</span>` 
                        : ''}
                `;
                container.appendChild(card);
            });

            document.getElementById("scan-instruction").innerText = "IMBAS QR SETERUSNYA (WAKIL)";
            document.getElementById("scan-instruction").style.color = "#9b59b6";
        });
    }

    function submitAll() {
        if (pendaftaranToUpdate.length === 0) return alert("Tiada pendaftaran baru untuk disahkan.");

        const btn = document.getElementById("btn-final");
        btn.disabled = true; btn.innerText = "Mengemaskini Firebase...";

        const now = new Date().toLocaleString("ms-MY", {timeZone: "Asia/Kuala_Lumpur"});
        const updates = {};

        pendaftaranToUpdate.forEach(item => {
            updates["participants/" + item.key + "/status"] = "COLLECTED";
            updates["participants/" + item.key + "/timestamp"] = now;
            updates["participants/" + item.key + "/collected_by"] = item.role;
        });

        db.ref().update(updates).then(() => {
            alert("✅ BERJAYA!\n" + pendaftaranToUpdate.length + " pendaftaran telah dikemaskini.");
            location.reload();
        });
    }
</script>
</body>
</html>
